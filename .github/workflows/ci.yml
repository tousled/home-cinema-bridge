name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  python-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile \
            app.py \
            xnoppo_web.py \
            lib/Xnoppo.py \
            lib/Xnoppo_AVR.py \
            lib/Xnoppo_TV.py \
            lib/oppo_autoscript.py

      - name: Smoke import core modules
        run: |
          python - <<'PY'
          import lib.Xnoppo
          import lib.Xnoppo_AVR
          import lib.Xnoppo_TV
          import lib.oppo_autoscript
          import lib.devices.av.factory
          print("Core imports OK")
          PY  