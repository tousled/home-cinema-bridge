name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  python-compile:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Compile Python files
        run: |
          python -m compileall lib src tools xnoppo_web.py

      - name: Check undefined Python names
        run: |
          python -m ruff check lib/devices/oppo lib/oppo_control.py xnoppo_web.py tools/oppo_qpl_probe.py tests --select F821

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests
